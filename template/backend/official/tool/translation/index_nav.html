<div class="page-aside xs-width app tree">
    <div class="fixed nano nscroller">
        <div class="content">
            <div class="header header-md">
                <button class="navbar-toggle" data-target=".treeview" data-toggle="collapse" type="button">
                    <span class="fa fa-chevron-down"></span>
                </button>
                <h2 class="page-title">{{`表`|$.T}}</h2>
            </div>
            <ul class="nav nav-list treeview collapse text-xs-90">
                {{- $table := $.Query `table` -}}
                {{- range $k,$v := call $.Func.tableTitles -}}
                <li {{- if eq $table $v.K }} class="active"{{ end }}>
                    <a href="{{BackendURL}}/tool/translation/index?table={{$v.K}}">{{$v.V|$.T}}</a>
                </li>
                {{- end -}}
            </ul>
        </div>
    </div>
</div>
