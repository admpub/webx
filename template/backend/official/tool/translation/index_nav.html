<div class="page-aside app tree sm-width">
    <button class="navbar-toggle no-margin wd-100p" data-target="#body-left-navigate" data-toggle="collapse" type="button">
	  <span class="fa fa-chevron-down"></span>
	</button>
    <div class="fixed nano nscroller responsive-nav collapse" id="body-left-navigate">
        <div class="content">
        	<div class="app-nav md-line-height no-margin-top">
				<p class="title">{{`资源`|$.T}}</p>
            <ul class="nav nav-pills nav-stacked">
                {{- $table := $.Stored.table -}}
                {{- range $k,$v := call $.Func.tableTitles -}}
                <li class="primary-active {{- if eq $table $v.K }} active{{ end }}">
                    <a href="{{BackendURL}}/tool/translation/index?table={{$v.K}}" title="{{if $v.V}}{{$v.V|$.T}}: {{end}}{{$v.K}}">{{$v.V|$.T}}</a>
                </li>
                {{- end -}}
            </ul>
            </div>
        </div>
    </div>
</div>
