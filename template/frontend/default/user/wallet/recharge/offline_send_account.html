{{Strip}}
<form class="form form-label-right" method="post" action="{{FrontendURL}}/user/wallet/recharge/offline" id="offlinePayForm">
<div class="card card-form">
    <div class="card-header">
        <a class="btn btn-inverse pull-right tx-white" href="{{FrontendURL}}/user/wallet/offline_pay_history">
          <i class="fa fa-list"></i>
          {{"历史记录"|$.T}}
        </a>
      <h6 class="card-title">{{"转账信息"|$.RawT|UpperCaseFirst|$.ExtT}}</h6>
    </div><!-- card-header -->
    <div class="card-body">

<div class="row form-group">
    <label class="col-sm-3 col-form-label">{{`付款方式`|$.RawT|UpperCaseFirst|$.ExtT}}</label>
    <div class="col-sm-8">{{$offlinePayMethod := $.Form `offlinePayMethod`}}
        <select class="form-control" name="offlinePayMethod" required id="offlinePayMethod">
            {{- range $k, $v := $.Stored.offlinePayMethods -}}
            <option value="{{$v.K}}"{{if eq $v.K $offlinePayMethod}} selected{{end}}>{{$v.V|$.T}}</option>
            {{- end -}}
        </select>
        <!-- <input type="text" class="form-control" name="offlinePayMethod" required> -->
    </div>
</div>
<div class="row form-group">
    <label class="col-sm-3 col-form-label">{{`付款账号`|$.RawT|UpperCaseFirst|$.ExtT}}</label>
    <div class="col-sm-8">
        <input type="text" class="form-control" name="offlinePayAccount" id="offlinePayAccount" value="{{$.Form `offlinePayAccount`}}" required>
    </div>
</div>
<div class="row form-group">
    <label class="col-sm-3 col-form-label">{{`付款金额`|$.RawT|UpperCaseFirst|$.ExtT}}</label>
    <div class="col-sm-8">
        <input type="number" class="form-control" name="offlinePayAmount" id="offlinePayAmount" min="0.01" step="0.01" value="{{$.Form `offlinePayAmount`}}" required>
    </div>
</div>
<div class="row form-group">
    <label class="col-sm-3 col-form-label">{{`付款时间`|$.RawT|UpperCaseFirst|$.ExtT}}</label>
    <div class="col-sm-8">
        <input type="datetime-local" class="form-control" name="offlinePayTime" id="offlinePayTime" value="{{$.Form `offlinePayTime`}}" required>
        <div class="help-block tx-gray-light small">{{`输入大概的付款时间，以便于定位转账记录`|$.T}}</div>
    </div>
</div>
<div class="row form-group method-type-bank">
    <label class="col-sm-3 col-form-label">{{`银行支行`|$.RawT|UpperCaseFirst|$.ExtT}}</label>
    <div class="col-sm-8">
        <input type="text" class="form-control" name="offlinePayBankBranch" id="offlinePayBankBranch" value="{{$.Form `offlinePayBankBranch`}}">
    </div>
</div>
<div class="row form-group method-type-ebank">
    <label class="col-sm-3 col-form-label">{{`交易订单号`|$.RawT|UpperCaseFirst|$.ExtT}}</label>
    <div class="col-sm-8">
        <input type="text" class="form-control" name="offlinePayTransactionNo" id="offlinePayTransactionNo" value="{{$.Form `offlinePayTransactionNo`}}">
    </div>
</div>
<div class="row form-group">
    <label class="col-sm-3 col-form-label">{{`开户人姓名`|$.RawT|UpperCaseFirst|$.ExtT}}</label>
    <div class="col-sm-8">
        <input type="text" class="form-control" name="offlinePayOwner" id="offlinePayOwner" value="{{$.Form `offlinePayOwner`}}" required>
    </div>
</div>
<div class="row form-group">
    <label class="col-sm-3 col-form-label">{{`附言`|$.RawT|UpperCaseFirst|$.ExtT}}</label>
    <div class="col-sm-8">
        <textarea class="form-control resize-y" name="postscript" id="postscript" maxlength="1000" placeholder="{{`可输入其它说明。可不填`|$.T}}">{{$.Form `postscript`}}</textarea>
    </div>
</div>

    </div><!-- card-body -->
{{- $returnURL := $.Form `next` | Default (printf `%s%s` FrontendURL `/user/wallet`) -}}
    <div class="card-footer">
      <div class="row form-group">
          <div class="col-sm-8 offset-sm-3">
              <input type="hidden" name="next" value="{{$.Form `next`}}">
              <button type="submit" class="btn btn-primary">{{`提交`|$.RawT|UpperCaseFirst|$.ExtT}}</button>
              <a href="{{$returnURL}}" class="btn btn-default tx-inverse">{{`返回`|$.RawT|UpperCaseFirst|$.ExtT}}</a>
          </div>
      </div>
    </div>
</div><!-- card -->
</form>
{{/Strip}}
