{{Strip}}{{$sourceInfo := $.Stored.sourceInfo}}
{{- if and $sourceInfo $sourceInfo.X -}}
<div class="container-wrapper pd-b-20 pd-t-20 bg-transparent">
  <div class="container">
    <div class="row pd-y-10 rainbow-bar rounded-3">
    <div class="col-12 d-flex justify-content-between">
      <div>
          {{- $detailURL := $sourceInfo.H.detailURL -}}
          <a href="{{$detailURL}}"><img src="{{$sourceInfo.H.coverURL|Default (AssetsXURL `/images/83.jpg`)}}" alt="{{$sourceInfo.V}}" class="img-fluid rounded-3" onerror="this.onerror=null;this.src='{{AssetsXURL}}/images/83.jpg';" style="max-width:100px"></a>
      </div><!-- col-4 -->
      <div class="pd-x-10 wd-100p">
        <h3 class="tx-inverse tx-spacing-neg-2 tx-bold tx-size-30 mg-b-5 mg-t-0">
          <a href="{{$detailURL}}" class="tx-white">{{$sourceInfo.V}}</a>
        </h3>
        <p class="mg-b-0 tx-size-14 line-clamp">{{Substr $sourceInfo.H.summary `...` 120}}</p>
      </div>
      <div>
        <a href="{{$detailURL}}" class="btn btn-success bd-0 tx-size-13 tx-spacing-2 pd-y-15 mg-t-60">
          {{`产品详情`|$.T}}
        </a>
      </div>
    </div><!-- d-flex -->
    </div>
  </div><!-- container -->
</div><!-- container-wrapper -->
{{- end -}}
{{/Strip}}
